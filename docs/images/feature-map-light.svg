    <text x="592" y="544" fill="#1F221D" font-size="34" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700">World Chat</text>
    <text x="558" y="576" fill="#6D7168" font-size="17" font-family="Inter, Segoe UI, Arial, sans-serif">The central prompt surface with empty-state branding, pill composer, contextual replies, and an inspector-ready chat flow.</text>

    <rect x="554" y="598" width="120" height="30" rx="15" fill="#F8F5EE" stroke="#D9D2C6"/>
    <text x="576" y="618" fill="#474A43" font-size="14" font-family="Inter, Segoe UI, Arial, sans-serif">Prompt-first</text>
    <rect x="684" y="598" width="112" height="30" rx="15" fill="#F8F5EE" stroke="#D9D2C6"/>
    <text x="708" y="618" fill="#474A43" font-size="14" font-family="Inter, Segoe UI, Arial, sans-serif">Inspector</text>
    <rect x="806" y="598" width="116" height="30" rx="15" fill="#F8F5EE" stroke="#D9D2C6"/>
    <text x="830" y="618" fill="#474A43" font-size="14" font-family="Inter, Segoe UI, Arial, sans-serif">Session state</text>
  </g>

  <g>
    <rect x="144" y="262" width="118" height="32" rx="16" fill="#F1F6EB" stroke="#D3DDC5"/>
    <text x="170" y="283" fill="#557045" font-size="14" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700">Workflow</text>
    <text x="144" y="326" fill="#1F221D" font-size="28" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700">Room-based runs</text>
    <text x="144" y="356" fill="#6E7268" font-size="15" font-family="Inter, Segoe UI, Arial, sans-serif">Collaboration rooms, saved templates, and fresh sessions for repeatable work.</text>
