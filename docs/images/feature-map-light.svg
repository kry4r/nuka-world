    <text x="166" y="397" fill="#4A4D45" font-size="13" font-family="Inter, Segoe UI, Arial, sans-serif">Templates</text>
    <rect x="266" y="378" width="94" height="28" rx="14" fill="#F8F5EE" stroke="#D9D2C6"/>
    <text x="292" y="397" fill="#4A4D45" font-size="13" font-family="Inter, Segoe UI, Arial, sans-serif">Sessions</text>
  </g>

  <g>
    <rect x="1084" y="262" width="104" height="32" rx="16" fill="#F1F6EB" stroke="#D3DDC5"/>
    <text x="1112" y="283" fill="#557045" font-size="14" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700">Agents</text>
    <text x="1084" y="326" fill="#1F221D" font-size="28" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700">Preset builders</text>
    <text x="1084" y="356" fill="#6E7268" font-size="15" font-family="Inter, Segoe UI, Arial, sans-serif">One-line creation, tool bindings, and reusable agent definitions for different tasks.</text>
    <rect x="1084" y="378" width="104" height="28" rx="14" fill="#F8F5EE" stroke="#D9D2C6"/>
    <text x="1108" y="397" fill="#4A4D45" font-size="13" font-family="Inter, Segoe UI, Arial, sans-serif">Bindings</text>
    <rect x="1198" y="378" width="104" height="28" rx="14" fill="#F8F5EE" stroke="#D9D2C6"/>
    <text x="1222" y="397" fill="#4A4D45" font-size="13" font-family="Inter, Segoe UI, Arial, sans-serif">Creation</text>
  </g>

  <g>
    <rect x="144" y="556" width="112" height="32" rx="16" fill="#F1F6EB" stroke="#D3DDC5"/>
    <text x="170" y="577" fill="#557045" font-size="14" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700">Memory</text>
    <text x="144" y="620" fill="#1F221D" font-size="28" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700">Graph perspectives</text>
    <text x="144" y="650" fill="#6E7268" font-size="15" font-family="Inter, Segoe UI, Arial, sans-serif">Layered node views, subject switching, and a structure built for multi-entity memory inspection.</text>
    <rect x="144" y="672" width="96" height="28" rx="14" fill="#F8F5EE" stroke="#D9D2C6"/>
    <text x="166" y="691" fill="#4A4D45" font-size="13" font-family="Inter, Segoe UI, Arial, sans-serif">Nodes</text>
    <rect x="250" y="672" width="112" height="28" rx="14" fill="#F8F5EE" stroke="#D9D2C6"/>
    <text x="274" y="691" fill="#4A4D45" font-size="13" font-family="Inter, Segoe UI, Arial, sans-serif">Layers</text>
  </g>

