<svg width="1440" height="1080" viewBox="0 0 1440 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#81776B" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="1440" height="1080" rx="32" fill="#F6F2E9"/>

  <text x="40" y="40" fill="#1F221D" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="38" font-weight="600" dominant-baseline="hanging">Nuka World Feature Map</text>
  <text x="40" y="96" fill="#6E7268" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="400" dominant-baseline="hanging">A product-facing map of the current desktop surfaces built around World Chat.</text>

  <rect x="40" y="146" width="1360" height="894" rx="28" fill="#FBF8F1"/>

  <g filter="url(#cardShadow)">
    <rect x="64" y="170" width="272" height="164" rx="28" fill="#FFFFFF"/>
    <rect x="1104" y="170" width="272" height="164" rx="28" fill="#FFFFFF"/>
    <rect x="466" y="350" width="460" height="250" rx="32" fill="#FFFFFF"/>
    <rect x="64" y="676" width="272" height="164" rx="28" fill="#FFFFFF"/>
    <rect x="1104" y="676" width="272" height="164" rx="28" fill="#FFFFFF"/>
    <rect x="466" y="856" width="460" height="160" rx="28" fill="#FFFFFF"/>
  </g>

  <rect x="695" y="616" width="2" height="44" rx="999" fill="#D7D1C4"/>

  <text x="86" y="192" fill="#6E8760" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" dominant-baseline="hanging">WORKFLOW</text>
  <text x="86" y="217" fill="#1F221D" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="600" dominant-baseline="hanging">Room-based runs</text>
  <text x="86" y="256" fill="#6E7268" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="400" dominant-baseline="hanging">Templates and repeatable execution.</text>

  <text x="1126" y="192" fill="#6E8760" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" dominant-baseline="hanging">AGENTS</text>
  <text x="1126" y="217" fill="#1F221D" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="600" dominant-baseline="hanging">Preset builders</text>
  <text x="1126" y="256" fill="#6E7268" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="400" dominant-baseline="hanging">One-line creation and tool bindings.</text>

  <text x="494" y="378" fill="#6E8760" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" dominant-baseline="hanging">CORE SURFACE</text>
  <text x="494" y="407" fill="#1F221D" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="34" font-weight="600" dominant-baseline="hanging">World Chat</text>
  <text x="494" y="462" fill="#6E7268" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="400" dominant-baseline="hanging">Prompt-first chat, session flow, and inspection.</text>

  <text x="86" y="698" fill="#6E8760" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" dominant-baseline="hanging">MEMORY</text>
  <text x="86" y="723" fill="#1F221D" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="600" dominant-baseline="hanging">Graph views</text>
  <text x="86" y="762" fill="#6E7268" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="400" dominant-baseline="hanging">Layered nodes and subject switching.</text>

  <text x="1126" y="698" fill="#6E8760" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" dominant-baseline="hanging">KNOWLEDGE</text>
  <text x="1126" y="723" fill="#1F221D" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="600" dominant-baseline="hanging">Layered libraries</text>
  <text x="1126" y="762" fill="#6E7268" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="400" dominant-baseline="hanging">External sources and chunked ingestion.</text>

  <text x="490" y="880" fill="#6E8760" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" dominant-baseline="hanging">SETTINGS</text>
  <text x="490" y="907" fill="#1F221D" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="600" dominant-baseline="hanging">Editable desktop controls</text>
  <text x="490" y="953" fill="#6E7268" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="400" dominant-baseline="hanging">Providers, appearance, and runtime as editable state.</text>
</svg>
