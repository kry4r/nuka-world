    <rect x="792" y="770" width="132" height="30" rx="15" fill="#F8F5EE" stroke="#D9D2C6"/>
    <text x="818" y="790" fill="#4A4D45" font-size="14" font-family="Inter, Segoe UI, Arial, sans-serif">Appearance</text>
