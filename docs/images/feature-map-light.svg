    <text x="546" y="336" fill="#557045" font-size="16" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700">Core Surface</text>

    <circle cx="720" cy="454" r="74" fill="url(#accent)" opacity="0.24" filter="url(#softGlow)"/>
    <rect x="666" y="384" width="108" height="108" rx="34" fill="#F4F8EE" stroke="#C7D7B7"/>
    <path d="M702 416C718 398 744 398 760 416" stroke="#587247" stroke-width="5" stroke-linecap="round"/>
