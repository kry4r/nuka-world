    <text x="1112" y="577" fill="#557045" font-size="14" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700">Knowledge</text>
    <text x="1084" y="620" fill="#1F221D" font-size="28" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700">Layered libraries</text>
    <text x="1084" y="650" fill="#6E7268" font-size="15" font-family="Inter, Segoe UI, Arial, sans-serif">External knowledge sources, chunked ingestion, and multi-level organization for retrieval-ready content.</text>
    <rect x="1084" y="672" width="110" height="28" rx="14" fill="#F8F5EE" stroke="#D9D2C6"/>
    <text x="1110" y="691" fill="#4A4D45" font-size="13" font-family="Inter, Segoe UI, Arial, sans-serif">Ingestion</text>
    <rect x="1204" y="672" width="104" height="28" rx="14" fill="#F8F5EE" stroke="#D9D2C6"/>
    <text x="1228" y="691" fill="#4A4D45" font-size="13" font-family="Inter, Segoe UI, Arial, sans-serif">Layers</text>
  </g>

  <g>
    <rect x="512" y="724" width="114" height="32" rx="16" fill="#F1F6EB" stroke="#D3DDC5"/>
    <text x="540" y="745" fill="#557045" font-size="14" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700">Settings</text>
    <text x="512" y="786" fill="#1F221D" font-size="28" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700">Editable desktop controls</text>
    <text x="512" y="816" fill="#6E7268" font-size="15" font-family="Inter, Segoe UI, Arial, sans-serif">Providers, appearance, and runtime are presented as real form state instead of static showcase panels.</text>

