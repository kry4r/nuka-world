  <text x="92" y="106" fill="#20231D" font-size="38" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700">Nuka World · Current Product Surfaces</text>
  <text x="92" y="144" fill="#6F7368" font-size="18" font-family="Inter, Segoe UI, Arial, sans-serif">A light map of the app surfaces that ship today, centered on World Chat and layered desktop workflows.</text>

