<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 860" role="img" aria-labelledby="title desc">
  <title id="title">Nuka World Architecture</title>
  <desc id="desc">Layered architecture for Nuka World: gateway, runtime core, skills and tools, data and retrieval, world simulation.</desc>

  <defs>
    <linearGradient id="canvasBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fbff" />
      <stop offset="100%" stop-color="#eef3fb" />
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1d4ed8" />
      <stop offset="100%" stop-color="#0ea5e9" />
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#2b3a55" flood-opacity="0.12" />
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5f7392" />
    </marker>
  </defs>

  <rect width="1200" height="860" fill="url(#canvasBg)" />
  <circle cx="1120" cy="90" r="120" fill="#dbeafe" opacity="0.42" />
  <circle cx="90" cy="790" r="150" fill="#e0f2fe" opacity="0.5" />

  <text x="600" y="62" text-anchor="middle" fill="url(#titleGrad)" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="34" font-weight="700">nuka_world architecture</text>
  <text x="600" y="92" text-anchor="middle" fill="#4b5f7d" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15">Autonomous multi-agent runtime with memory, skills, and world simulation</text>

  <!-- Layer 1 -->
  <g filter="url(#softShadow)">
    <rect x="60" y="120" width="1080" height="104" rx="18" fill="#ffffff" stroke="#93c5fd" stroke-width="1.5" />
  </g>
  <text x="88" y="148" fill="#2563eb" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="700" letter-spacing="1.2">LAYER 1 - GATEWAY</text>
  <rect x="100" y="164" width="230" height="44" rx="10" fill="#eff6ff" stroke="#bfdbfe" />
  <rect x="360" y="164" width="230" height="44" rx="10" fill="#eff6ff" stroke="#bfdbfe" />
  <rect x="620" y="164" width="230" height="44" rx="10" fill="#eff6ff" stroke="#bfdbfe" />
  <rect x="880" y="164" width="230" height="44" rx="10" fill="#eff6ff" stroke="#bfdbfe" />
  <text x="215" y="192" text-anchor="middle" fill="#1e3a8a" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="600">REST API</text>
  <text x="475" y="192" text-anchor="middle" fill="#1e3a8a" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="600">Slack Adapter</text>
  <text x="735" y="192" text-anchor="middle" fill="#1e3a8a" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="600">Discord Adapter</text>
  <text x="995" y="192" text-anchor="middle" fill="#1e3a8a" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="600">Web Client</text>

  <!-- Layer 2 -->
  <g filter="url(#softShadow)">
    <rect x="60" y="250" width="1080" height="104" rx="18" fill="#ffffff" stroke="#7dd3fc" stroke-width="1.5" />
  </g>
  <text x="88" y="278" fill="#0284c7" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="700" letter-spacing="1.2">LAYER 2 - RUNTIME CORE</text>
  <rect x="100" y="294" width="230" height="44" rx="10" fill="#f0f9ff" stroke="#bae6fd" />
  <rect x="360" y="294" width="230" height="44" rx="10" fill="#f0f9ff" stroke="#bae6fd" />
  <rect x="620" y="294" width="230" height="44" rx="10" fill="#f0f9ff" stroke="#bae6fd" />
  <rect x="880" y="294" width="230" height="44" rx="10" fill="#f0f9ff" stroke="#bae6fd" />
  <text x="215" y="322" text-anchor="middle" fill="#0f4c81" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="600">Command Registry</text>
  <text x="475" y="322" text-anchor="middle" fill="#0f4c81" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="600">Agent Engine</text>
  <text x="735" y="322" text-anchor="middle" fill="#0f4c81" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="600">Provider Router</text>
  <text x="995" y="322" text-anchor="middle" fill="#0f4c81" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="600">Message Router</text>

  <!-- Layer 3 -->
  <g filter="url(#softShadow)">
    <rect x="60" y="380" width="1080" height="104" rx="18" fill="#ffffff" stroke="#a5b4fc" stroke-width="1.5" />
  </g>
  <text x="88" y="408" fill="#4f46e5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="700" letter-spacing="1.2">LAYER 3 - SKILLS AND TOOLS</text>
  <rect x="100" y="424" width="230" height="44" rx="10" fill="#eef2ff" stroke="#c7d2fe" />
  <rect x="360" y="424" width="230" height="44" rx="10" fill="#eef2ff" stroke="#c7d2fe" />
  <rect x="620" y="424" width="230" height="44" rx="10" fill="#eef2ff" stroke="#c7d2fe" />
  <rect x="880" y="424" width="230" height="44" rx="10" fill="#eef2ff" stroke="#c7d2fe" />
  <text x="215" y="452" text-anchor="middle" fill="#312e81" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="600">Skill Manager</text>
  <text x="475" y="452" text-anchor="middle" fill="#312e81" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="600">Cmd-as-Tool Bridge</text>
  <text x="735" y="452" text-anchor="middle" fill="#312e81" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="600">MCP Clients</text>
  <text x="995" y="452" text-anchor="middle" fill="#312e81" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="600">Orchestrator</text>

  <!-- Layer 4 -->
  <g filter="url(#softShadow)">
    <rect x="60" y="510" width="1080" height="104" rx="18" fill="#ffffff" stroke="#86efac" stroke-width="1.5" />
  </g>
  <text x="88" y="538" fill="#15803d" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="700" letter-spacing="1.2">LAYER 4 - DATA AND RETRIEVAL</text>
  <rect x="100" y="554" width="230" height="44" rx="10" fill="#f0fdf4" stroke="#bbf7d0" />
  <rect x="360" y="554" width="230" height="44" rx="10" fill="#f0fdf4" stroke="#bbf7d0" />
  <rect x="620" y="554" width="230" height="44" rx="10" fill="#f0fdf4" stroke="#bbf7d0" />
  <rect x="880" y="554" width="230" height="44" rx="10" fill="#f0fdf4" stroke="#bbf7d0" />
  <text x="215" y="576" text-anchor="middle" fill="#14532d" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="600">Neo4j</text>
  <text x="215" y="592" text-anchor="middle" fill="#3f5b44" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11">Memory Graph</text>
  <text x="475" y="576" text-anchor="middle" fill="#14532d" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="600">PostgreSQL</text>
  <text x="475" y="592" text-anchor="middle" fill="#3f5b44" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11">Persistence</text>
  <text x="735" y="576" text-anchor="middle" fill="#14532d" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="600">Qdrant</text>
  <text x="735" y="592" text-anchor="middle" fill="#3f5b44" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11">Vector Search</text>
  <text x="995" y="576" text-anchor="middle" fill="#14532d" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="600">Redis</text>
  <text x="995" y="592" text-anchor="middle" fill="#3f5b44" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11">Message Bus</text>

  <!-- Layer 5 -->
  <g filter="url(#softShadow)">
    <rect x="60" y="640" width="1080" height="104" rx="18" fill="#ffffff" stroke="#f9a8d4" stroke-width="1.5" />
  </g>
  <text x="88" y="668" fill="#be185d" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="700" letter-spacing="1.2">LAYER 5 - WORLD SIMULATION</text>
  <rect x="100" y="684" width="230" height="44" rx="10" fill="#fdf2f8" stroke="#fbcfe8" />
  <rect x="360" y="684" width="230" height="44" rx="10" fill="#fdf2f8" stroke="#fbcfe8" />
  <rect x="620" y="684" width="230" height="44" rx="10" fill="#fdf2f8" stroke="#fbcfe8" />
  <rect x="880" y="684" width="230" height="44" rx="10" fill="#fdf2f8" stroke="#fbcfe8" />
  <text x="215" y="712" text-anchor="middle" fill="#831843" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="600">World Clock</text>
  <text x="475" y="712" text-anchor="middle" fill="#831843" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="600">Heartbeat Loop</text>
  <text x="735" y="712" text-anchor="middle" fill="#831843" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="600">Relations Graph</text>
  <text x="995" y="712" text-anchor="middle" fill="#831843" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="600">State and Growth</text>

  <!-- Vertical flow -->
  <line x1="600" y1="224" x2="600" y2="250" stroke="#5f7392" stroke-width="2.2" marker-end="url(#arrow)" />
  <line x1="600" y1="354" x2="600" y2="380" stroke="#5f7392" stroke-width="2.2" marker-end="url(#arrow)" />
  <line x1="600" y1="484" x2="600" y2="510" stroke="#5f7392" stroke-width="2.2" marker-end="url(#arrow)" />
  <line x1="600" y1="614" x2="600" y2="640" stroke="#5f7392" stroke-width="2.2" marker-end="url(#arrow)" />

  <!-- Feedback loop -->
  <path d="M 475 684 L 475 766 L 1130 766 L 1130 316 L 1110 316" fill="none" stroke="#be185d" stroke-width="1.8" stroke-dasharray="6 5" marker-end="url(#arrow)" />
  <text x="1138" y="548" transform="rotate(90 1138 548)" fill="#9d174d" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11">autonomous feedback to runtime</text>

  <text x="600" y="808" text-anchor="middle" fill="#59708f" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12">
    Go 1.25 - OpenAI/Anthropic Providers - Neo4j/PostgreSQL/Qdrant/Redis
  </text>
</svg>
