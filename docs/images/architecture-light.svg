    <path d="M80 430H1360" stroke="#E4DED1" stroke-width="1"/>
    <path d="M80 510H1360" stroke="#E4DED1" stroke-width="1"/>
    <path d="M80 590H1360" stroke="#E4DED1" stroke-width="1"/>
    <path d="M80 670H1360" stroke="#E4DED1" stroke-width="1"/>
    <path d="M80 750H1360" stroke="#E4DED1" stroke-width="1"/>
    <path d="M160 70V850" stroke="#E4DED1" stroke-width="1"/>
    <path d="M320 70V850" stroke="#E4DED1" stroke-width="1"/>
    <path d="M480 70V850" stroke="#E4DED1" stroke-width="1"/>
    <path d="M640 70V850" stroke="#E4DED1" stroke-width="1"/>
    <path d="M800 70V850" stroke="#E4DED1" stroke-width="1"/>
    <path d="M960 70V850" stroke="#E4DED1" stroke-width="1"/>
    <path d="M1120 70V850" stroke="#E4DED1" stroke-width="1"/>
    <path d="M1280 70V850" stroke="#E4DED1" stroke-width="1"/>
  </g>

  <circle cx="1270" cy="126" r="92" fill="#C6D5B3" opacity="0.18" filter="url(#glow)"/>
  <circle cx="210" cy="784" r="120" fill="#EEE7D8" opacity="0.85"/>
  <circle cx="1180" cy="734" r="144" fill="#EEF3E4" opacity="0.72"/>

  <text x="92" y="104" fill="#20231D" font-size="38" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700">Nuka World · Light Architecture</text>
  <text x="92" y="142" fill="#6E7268" font-size="18" font-family="Inter, Segoe UI, Arial, sans-serif">Desktop-first AI workspace with a React surface, Tauri shell, Rust domain core, and local-first runtime foundations.</text>

  <g filter="url(#shadow)">
    <rect x="88" y="188" width="940" height="122" rx="28" fill="url(#card)" stroke="#D9D2C4"/>
    <rect x="88" y="338" width="940" height="122" rx="28" fill="url(#card)" stroke="#D9D2C4"/>
    <rect x="88" y="488" width="940" height="152" rx="28" fill="url(#card)" stroke="#D9D2C4"/>
    <rect x="88" y="668" width="940" height="132" rx="28" fill="url(#card)" stroke="#D9D2C4"/>
  </g>

  <path d="M558 310V338" stroke="#A4B293" stroke-width="3" stroke-linecap="round"/>
  <path d="M558 460V488" stroke="#A4B293" stroke-width="3" stroke-linecap="round"/>
  <path d="M558 640V668" stroke="#A4B293" stroke-width="3" stroke-linecap="round"/>
  <circle cx="558" cy="324" r="6" fill="#A4B293"/>
  <circle cx="558" cy="474" r="6" fill="#A4B293"/>
  <circle cx="558" cy="654" r="6" fill="#A4B293"/>

  <g>
    <rect x="116" y="214" width="164" height="36" rx="18" fill="#EEF4E6" stroke="#D2DDC2"/>
    <text x="138" y="238" fill="#567046" font-size="16" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700">01 · Desktop UI</text>
    <text x="116" y="272" fill="#1F221D" font-size="28" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700">React + TypeScript surface</text>
    <text x="116" y="298" fill="#6C7067" font-size="16" font-family="Inter, Segoe UI, Arial, sans-serif">AppShell organizes the sidebar, chat canvas, inspector, and editable settings surfaces.</text>

    <rect x="702" y="216" width="110" height="30" rx="15" fill="#F7F5EF" stroke="#D8D1C4"/>
    <text x="729" y="236" fill="#44473F" font-size="14" font-family="Inter, Segoe UI, Arial, sans-serif">Chat</text>
    <rect x="824" y="216" width="126" height="30" rx="15" fill="#F7F5EF" stroke="#D8D1C4"/>
    <text x="848" y="236" fill="#44473F" font-size="14" font-family="Inter, Segoe UI, Arial, sans-serif">Workflow</text>
    <rect x="702" y="256" width="110" height="30" rx="15" fill="#F7F5EF" stroke="#D8D1C4"/>
    <text x="724" y="276" fill="#44473F" font-size="14" font-family="Inter, Segoe UI, Arial, sans-serif">Agents</text>
    <rect x="824" y="256" width="110" height="30" rx="15" fill="#F7F5EF" stroke="#D8D1C4"/>
    <text x="846" y="276" fill="#44473F" font-size="14" font-family="Inter, Segoe UI, Arial, sans-serif">Memory</text>
    <rect x="946" y="216" width="132" height="30" rx="15" fill="#F7F5EF" stroke="#D8D1C4"/>
    <text x="968" y="236" fill="#44473F" font-size="14" font-family="Inter, Segoe UI, Arial, sans-serif">Knowledge</text>
    <rect x="946" y="256" width="118" height="30" rx="15" fill="#F7F5EF" stroke="#D8D1C4"/>
    <text x="968" y="276" fill="#44473F" font-size="14" font-family="Inter, Segoe UI, Arial, sans-serif">Settings</text>
  </g>

  <g>
    <rect x="116" y="364" width="150" height="36" rx="18" fill="#EEF4E6" stroke="#D2DDC2"/>
    <text x="140" y="388" fill="#567046" font-size="16" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700">02 · Tauri Shell</text>
    <text x="116" y="422" fill="#1F221D" font-size="28" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700">Desktop lifecycle and bridge</text>
    <text x="116" y="448" fill="#6C7067" font-size="16" font-family="Inter, Segoe UI, Arial, sans-serif">Custom chrome, tray behavior, native events, and command routing keep the app feeling local-first.</text>

    <g transform="translate(694 364)">
      <rect width="306" height="70" rx="22" fill="#F9F7F2" stroke="#D8D1C4"/>
      <circle cx="34" cy="35" r="12" fill="#A4B293"/>
      <text x="62" y="31" fill="#23261F" font-size="16" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700">Window + Tray Control</text>
      <text x="62" y="51" fill="#6C7067" font-size="13" font-family="Inter, Segoe UI, Arial, sans-serif">Hide-on-close, custom traffic lights, resident runtime.</text>
    </g>
  </g>

  <g>
    <rect x="116" y="514" width="176" height="36" rx="18" fill="#EEF4E6" stroke="#D2DDC2"/>
    <text x="140" y="538" fill="#567046" font-size="16" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700">03 · Rust Workspace</text>
    <text x="116" y="580" fill="#1F221D" font-size="28" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700">Domain-driven backend crates</text>
    <text x="116" y="606" fill="#6C7067" font-size="16" font-family="Inter, Segoe UI, Arial, sans-serif">Dedicated crates separate domain contracts, orchestration, persistence, memory, knowledge, tools, and integrations.</text>

    <g transform="translate(664 520)">
      <rect width="136" height="38" rx="19" fill="#F7F5EF" stroke="#D8D1C4"/>
      <text x="28" y="24" fill="#44473F" font-size="14" font-family="JetBrains Mono, Consolas, monospace">nuka-domain</text>
      <rect x="148" width="142" height="38" rx="19" fill="#F7F5EF" stroke="#D8D1C4"/>
      <text x="178" y="24" fill="#44473F" font-size="14" font-family="JetBrains Mono, Consolas, monospace">nuka-runtime</text>
      <rect x="302" width="142" height="38" rx="19" fill="#F7F5EF" stroke="#D8D1C4"/>
      <text x="332" y="24" fill="#44473F" font-size="14" font-family="JetBrains Mono, Consolas, monospace">nuka-storage</text>

      <rect y="54" width="142" height="38" rx="19" fill="#F7F5EF" stroke="#D8D1C4"/>
      <text x="28" y="78" fill="#44473F" font-size="14" font-family="JetBrains Mono, Consolas, monospace">nuka-memory</text>
      <rect x="154" y="54" width="162" height="38" rx="19" fill="#F7F5EF" stroke="#D8D1C4"/>
      <text x="182" y="78" fill="#44473F" font-size="14" font-family="JetBrains Mono, Consolas, monospace">nuka-knowledge</text>
      <rect x="328" y="54" width="126" height="38" rx="19" fill="#F7F5EF" stroke="#D8D1C4"/>
      <text x="362" y="78" fill="#44473F" font-size="14" font-family="JetBrains Mono, Consolas, monospace">nuka-tools</text>

      <rect x="106" y="108" width="186" height="38" rx="19" fill="#EEF4E6" stroke="#D2DDC2"/>
      <text x="128" y="132" fill="#567046" font-size="14" font-family="JetBrains Mono, Consolas, monospace">nuka-integrations</text>
    </g>
  </g>

  <g>
    <rect x="116" y="694" width="192" height="36" rx="18" fill="#EEF4E6" stroke="#D2DDC2"/>
    <text x="140" y="718" fill="#567046" font-size="16" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700">04 · Local Foundations</text>
    <text x="116" y="758" fill="#1F221D" font-size="28" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700">State, storage, and integrations</text>
    <text x="116" y="784" fill="#6C7067" font-size="16" font-family="Inter, Segoe UI, Arial, sans-serif">SQLite stores sessions and templates, while provider config, file I/O, and external adapters complete the local runtime.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1072" y="188" width="284" height="612" rx="30" fill="#FBFAF6" stroke="#D9D2C4"/>
  </g>
  <text x="1104" y="236" fill="#1E211C" font-size="24" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700">Runtime Flow</text>
  <text x="1104" y="266" fill="#6E7268" font-size="15" font-family="Inter, Segoe UI, Arial, sans-serif">A compact view of how one prompt moves through the desktop stack.</text>

  <g>
    <rect x="1104" y="304" width="220" height="86" rx="24" fill="#FFFFFF" stroke="#D8D1C4"/>
    <rect x="1104" y="414" width="220" height="86" rx="24" fill="#FFFFFF" stroke="#D8D1C4"/>
    <rect x="1104" y="524" width="220" height="86" rx="24" fill="#FFFFFF" stroke="#D8D1C4"/>
    <rect x="1104" y="634" width="220" height="112" rx="24" fill="#FFFFFF" stroke="#D8D1C4"/>

    <circle cx="1138" cy="347" r="10" fill="url(#accent)"/>
    <circle cx="1138" cy="457" r="10" fill="url(#accent)"/>
    <circle cx="1138" cy="567" r="10" fill="url(#accent)"/>
    <circle cx="1138" cy="677" r="10" fill="url(#accent)"/>

    <text x="1162" y="340" fill="#1F221D" font-size="18" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700">Prompt enters UI</text>
    <text x="1162" y="363" fill="#6C7067" font-size="14" font-family="Inter, Segoe UI, Arial, sans-serif">Chat composer or saved workflow starts a session.</text>

    <text x="1162" y="450" fill="#1F221D" font-size="18" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700">Tauri dispatches</text>
    <text x="1162" y="473" fill="#6C7067" font-size="14" font-family="Inter, Segoe UI, Arial, sans-serif">Native command bridge hands work to the runtime.</text>

    <text x="1162" y="560" fill="#1F221D" font-size="18" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700">Rust orchestrates</text>
    <text x="1162" y="583" fill="#6C7067" font-size="14" font-family="Inter, Segoe UI, Arial, sans-serif">Memory, knowledge, tools, and providers resolve the route.</text>

    <text x="1162" y="670" fill="#1F221D" font-size="18" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700">State is persisted</text>
    <text x="1162" y="693" fill="#6C7067" font-size="14" font-family="Inter, Segoe UI, Arial, sans-serif">SQLite sessions, local settings, and desktop lifecycle continue the flow.</text>
    <text x="1162" y="714" fill="#6C7067" font-size="14" font-family="Inter, Segoe UI, Arial, sans-serif">The UI gets a clean response and keeps the workspace reactive.</text>
  </g>

  <path d="M1214 390V414" stroke="#A4B293" stroke-width="3" stroke-linecap="round"/>
  <path d="M1214 500V524" stroke="#A4B293" stroke-width="3" stroke-linecap="round"/>
  <path d="M1214 610V634" stroke="#A4B293" stroke-width="3" stroke-linecap="round"/>
