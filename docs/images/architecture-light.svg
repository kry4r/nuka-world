<svg width="1440" height="920" viewBox="0 0 1440 920" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="120" y1="60" x2="1320" y2="860" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FCFBF7"/>
      <stop offset="1" stop-color="#F4F1E8"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFFFFF" stop-opacity="0.98"/>
      <stop offset="1" stop-color="#F6F3EC" stop-opacity="0.96"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#C6D5B3"/>
      <stop offset="1" stop-color="#8FA57A"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#6B7A5E" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="28" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1440" height="920" rx="32" fill="url(#bg)"/>

  <g opacity="0.48">
    <path d="M80 110H1360" stroke="#D7D1C3" stroke-width="1"/>
    <path d="M80 190H1360" stroke="#E4DED1" stroke-width="1"/>
