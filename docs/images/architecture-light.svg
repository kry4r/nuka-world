<svg width="1440" height="920" viewBox="0 0 1440 920" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#81776B" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="1440" height="920" rx="32" fill="#F6F2E9"/>

  <text x="40" y="40" fill="#1F221D" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="38" font-weight="600" dominant-baseline="hanging">Nuka World Architecture</text>
  <text x="40" y="96" fill="#6E7268" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="400" dominant-baseline="hanging">A clean view of the desktop stack: UI, shell, Rust workspace, and local foundations.</text>

  <g filter="url(#cardShadow)">
    <rect x="40" y="146" width="940" height="128" rx="28" fill="#FFFFFF"/>
    <rect x="40" y="294" width="940" height="128" rx="28" fill="#FFFFFF"/>
    <rect x="40" y="442" width="940" height="144" rx="28" fill="#FFFFFF"/>
    <rect x="40" y="606" width="940" height="128" rx="28" fill="#FFFFFF"/>
    <rect x="1008" y="146" width="392" height="734" rx="28" fill="#FBF8F1"/>
    <rect x="1032" y="252" width="344" height="88" rx="22" fill="#FFFFFF"/>
    <rect x="1032" y="358" width="344" height="88" rx="22" fill="#FFFFFF"/>
    <rect x="1032" y="464" width="344" height="88" rx="22" fill="#FFFFFF"/>
    <rect x="1032" y="570" width="344" height="104" rx="22" fill="#FFFFFF"/>
    <rect x="1032" y="768" width="344" height="88" rx="22" fill="#F4F0E8"/>
  </g>

  <text x="64" y="170" fill="#6E8760" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" dominant-baseline="hanging">01 · DESKTOP UI</text>
  <text x="64" y="195" fill="#1F221D" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="600" dominant-baseline="hanging">React product surfaces</text>
  <text x="64" y="239" fill="#6E7268" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="400" dominant-baseline="hanging">Shell, chat, settings, and desktop pages.</text>

  <text x="64" y="318" fill="#6E8760" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" dominant-baseline="hanging">02 · TAURI SHELL</text>
  <text x="64" y="343" fill="#1F221D" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="600" dominant-baseline="hanging">Native lifecycle bridge</text>
  <text x="64" y="387" fill="#6E7268" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="400" dominant-baseline="hanging">Window controls, tray, and command routing.</text>

  <text x="64" y="466" fill="#6E8760" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" dominant-baseline="hanging">03 · RUST WORKSPACE</text>
  <text x="64" y="491" fill="#1F221D" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="600" dominant-baseline="hanging">Modular backend crates</text>
  <text x="64" y="535" fill="#6E7268" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="400" dominant-baseline="hanging">Domain, runtime, storage, memory, knowledge, tools, integrations.</text>

  <text x="64" y="630" fill="#6E8760" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" dominant-baseline="hanging">04 · LOCAL FOUNDATIONS</text>
  <text x="64" y="655" fill="#1F221D" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="600" dominant-baseline="hanging">State and persistence</text>
  <text x="64" y="699" fill="#6E7268" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="400" dominant-baseline="hanging">SQLite, providers, local files, and resources.</text>

  <text x="1032" y="170" fill="#1F221D" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="600" dominant-baseline="hanging">Runtime Flow</text>
  <text x="1032" y="217" fill="#6E7268" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="400" dominant-baseline="hanging">One prompt moving through the stack.</text>

  <text x="1050" y="270" fill="#1F221D" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="600" dominant-baseline="hanging">Prompt enters UI</text>
  <text x="1050" y="300" fill="#6E7268" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="400" dominant-baseline="hanging">Chat or workflow starts a session.</text>

  <text x="1050" y="376" fill="#1F221D" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="600" dominant-baseline="hanging">Tauri dispatches</text>
  <text x="1050" y="406" fill="#6E7268" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="400" dominant-baseline="hanging">Native commands route work to runtime.</text>

  <text x="1050" y="482" fill="#1F221D" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="600" dominant-baseline="hanging">Rust resolves route</text>
  <text x="1050" y="512" fill="#6E7268" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="400" dominant-baseline="hanging">Memory, knowledge, tools, and providers cooperate.</text>

  <text x="1050" y="588" fill="#1F221D" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="600" dominant-baseline="hanging">State persists locally</text>
  <text x="1050" y="618" fill="#6E7268" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="400" dominant-baseline="hanging">Sessions and settings stay local.</text>

  <text x="1050" y="786" fill="#1F221D" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="600" dominant-baseline="hanging">Local-first runtime</text>
  <text x="1050" y="816" fill="#6E7268" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="400" dominant-baseline="hanging">Local state stays close to the desktop shell.</text>
</svg>
