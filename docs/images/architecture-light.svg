    <rect x="96" y="334" width="932" height="120" rx="28" fill="url(#panel)" stroke="#D8D1C4"/>
    <rect x="96" y="484" width="932" height="144" rx="28" fill="url(#panel)" stroke="#D8D1C4"/>
    <rect x="96" y="658" width="932" height="120" rx="28" fill="url(#panel)" stroke="#D8D1C4"/>
    <rect x="1068" y="184" width="276" height="594" rx="28" fill="url(#panel)" stroke="#D8D1C4"/>
  </g>

  <path d="M562 304V334" stroke="#9EAF8A" stroke-width="3" stroke-linecap="round"/>
  <path d="M562 454V484" stroke="#9EAF8A" stroke-width="3" stroke-linecap="round"/>
  <path d="M562 628V658" stroke="#9EAF8A" stroke-width="3" stroke-linecap="round"/>
