  <circle cx="562" cy="469" r="6" fill="#9EAF8A"/>
  <circle cx="562" cy="643" r="6" fill="#9EAF8A"/>

  <g>
    <rect x="126" y="208" width="150" height="34" rx="17" fill="#EEF4E6" stroke="#D0DCC0"/>
    <text x="149" y="230" fill="#567045" font-size="15" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700">01 · Desktop UI</text>
    <text x="126" y="272" fill="#1F221D" font-size="28" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700">React product surfaces</text>
    <text x="126" y="298" fill="#6E7268" font-size="16" font-family="Inter, Segoe UI, Arial, sans-serif">Shell, chat canvas, settings forms, and all desktop pages.</text>

    <rect x="704" y="214" width="92" height="28" rx="14" fill="#F8F5EE" stroke="#D8D1C4"/>
    <text x="732" y="232" fill="#464942" font-size="13" font-family="Inter, Segoe UI, Arial, sans-serif">Chat</text>
    <rect x="808" y="214" width="116" height="28" rx="14" fill="#F8F5EE" stroke="#D8D1C4"/>
    <text x="834" y="232" fill="#464942" font-size="13" font-family="Inter, Segoe UI, Arial, sans-serif">Workflow</text>
    <rect x="704" y="252" width="96" height="28" rx="14" fill="#F8F5EE" stroke="#D8D1C4"/>
    <text x="730" y="270" fill="#464942" font-size="13" font-family="Inter, Segoe UI, Arial, sans-serif">Agents</text>
    <rect x="812" y="252" width="100" height="28" rx="14" fill="#F8F5EE" stroke="#D8D1C4"/>
    <text x="836" y="270" fill="#464942" font-size="13" font-family="Inter, Segoe UI, Arial, sans-serif">Memory</text>
    <rect x="924" y="214" width="104" height="28" rx="14" fill="#F8F5EE" stroke="#D8D1C4"/>
    <text x="948" y="232" fill="#464942" font-size="13" font-family="Inter, Segoe UI, Arial, sans-serif">Knowledge</text>
    <rect x="924" y="252" width="98" height="28" rx="14" fill="#F8F5EE" stroke="#D8D1C4"/>
    <text x="950" y="270" fill="#464942" font-size="13" font-family="Inter, Segoe UI, Arial, sans-serif">Settings</text>
  </g>

  <g>
    <rect x="126" y="358" width="146" height="34" rx="17" fill="#EEF4E6" stroke="#D0DCC0"/>
    <text x="150" y="380" fill="#567045" font-size="15" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700">02 · Tauri Shell</text>
    <text x="126" y="422" fill="#1F221D" font-size="28" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700">Native lifecycle bridge</text>
    <text x="126" y="448" fill="#6E7268" font-size="16" font-family="Inter, Segoe UI, Arial, sans-serif">Window controls, tray behavior, command routing, and desktop events.</text>

    <rect x="694" y="368" width="304" height="52" rx="18" fill="#F8F5EE" stroke="#D8D1C4"/>
    <circle cx="726" cy="394" r="9" fill="url(#accent)"/>
    <text x="748" y="389" fill="#23261F" font-size="16" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700">Window + Tray Control</text>
    <text x="748" y="409" fill="#6E7268" font-size="13" font-family="Inter, Segoe UI, Arial, sans-serif">Close policy, custom chrome, and long-running presence.</text>
  </g>

  <g>
    <rect x="126" y="508" width="170" height="34" rx="17" fill="#EEF4E6" stroke="#D0DCC0"/>
    <text x="149" y="530" fill="#567045" font-size="15" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700">03 · Rust Workspace</text>
    <text x="126" y="574" fill="#1F221D" font-size="28" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700">Modular backend crates</text>
    <text x="126" y="600" fill="#6E7268" font-size="16" font-family="Inter, Segoe UI, Arial, sans-serif">Domain, orchestration, persistence, memory, knowledge, tools, and integrations.</text>

    <rect x="656" y="520" width="144" height="34" rx="17" fill="#F8F5EE" stroke="#D8D1C4"/>
    <text x="688" y="542" fill="#464942" font-size="13" font-family="JetBrains Mono, Consolas, monospace">nuka-domain</text>
    <rect x="812" y="520" width="146" height="34" rx="17" fill="#F8F5EE" stroke="#D8D1C4"/>
    <text x="842" y="542" fill="#464942" font-size="13" font-family="JetBrains Mono, Consolas, monospace">nuka-runtime</text>
    <rect x="656" y="566" width="146" height="34" rx="17" fill="#F8F5EE" stroke="#D8D1C4"/>
    <text x="684" y="588" fill="#464942" font-size="13" font-family="JetBrains Mono, Consolas, monospace">nuka-storage</text>
    <rect x="814" y="566" width="140" height="34" rx="17" fill="#F8F5EE" stroke="#D8D1C4"/>
    <text x="846" y="588" fill="#464942" font-size="13" font-family="JetBrains Mono, Consolas, monospace">nuka-memory</text>
    <rect x="656" y="612" width="154" height="34" rx="17" fill="#F8F5EE" stroke="#D8D1C4"/>
    <text x="682" y="634" fill="#464942" font-size="13" font-family="JetBrains Mono, Consolas, monospace">nuka-knowledge</text>
    <rect x="822" y="612" width="132" height="34" rx="17" fill="#F8F5EE" stroke="#D8D1C4"/>
    <text x="856" y="634" fill="#464942" font-size="13" font-family="JetBrains Mono, Consolas, monospace">nuka-tools</text>
    <rect x="736" y="658" width="170" height="34" rx="17" fill="#EEF4E6" stroke="#D0DCC0"/>
    <text x="762" y="680" fill="#567045" font-size="13" font-family="JetBrains Mono, Consolas, monospace">nuka-integrations</text>
  </g>

  <g>
    <rect x="126" y="682" width="176" height="34" rx="17" fill="#EEF4E6" stroke="#D0DCC0"/>
    <text x="149" y="704" fill="#567045" font-size="15" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700">04 · Local Foundations</text>
    <text x="126" y="746" fill="#1F221D" font-size="28" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700">State and persistence</text>
    <text x="126" y="772" fill="#6E7268" font-size="16" font-family="Inter, Segoe UI, Arial, sans-serif">SQLite, provider config, file access, and local resources.</text>
  </g>

  <text x="1098" y="218" fill="#1F221D" font-size="24" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700">Runtime Flow</text>
  <text x="1098" y="246" fill="#6E7268" font-size="14" font-family="Inter, Segoe UI, Arial, sans-serif">One prompt moving through the stack.</text>

  <g>
    <rect x="1088" y="286" width="236" height="92" rx="22" fill="#FFFFFF" stroke="#D8D1C4"/>
    <rect x="1088" y="394" width="236" height="92" rx="22" fill="#FFFFFF" stroke="#D8D1C4"/>
    <rect x="1088" y="502" width="236" height="92" rx="22" fill="#FFFFFF" stroke="#D8D1C4"/>
    <rect x="1088" y="610" width="236" height="118" rx="22" fill="#FFFFFF" stroke="#D8D1C4"/>

    <circle cx="1122" cy="332" r="9" fill="url(#accent)"/>
    <text x="1144" y="326" fill="#1F221D" font-size="17" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700">Prompt enters UI</text>
    <text x="1144" y="347" fill="#6E7268" font-size="13" font-family="Inter, Segoe UI, Arial, sans-serif">Chat or workflow</text>
    <text x="1144" y="366" fill="#6E7268" font-size="13" font-family="Inter, Segoe UI, Arial, sans-serif">starts a session.</text>

    <circle cx="1122" cy="440" r="9" fill="url(#accent)"/>
    <text x="1144" y="434" fill="#1F221D" font-size="17" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700">Tauri dispatches</text>
    <text x="1144" y="455" fill="#6E7268" font-size="13" font-family="Inter, Segoe UI, Arial, sans-serif">Native commands route work</text>
    <text x="1144" y="474" fill="#6E7268" font-size="13" font-family="Inter, Segoe UI, Arial, sans-serif">to the runtime layer.</text>

    <circle cx="1122" cy="548" r="9" fill="url(#accent)"/>
    <text x="1144" y="542" fill="#1F221D" font-size="17" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700">Rust resolves route</text>
    <text x="1144" y="563" fill="#6E7268" font-size="13" font-family="Inter, Segoe UI, Arial, sans-serif">Memory, knowledge, tools,</text>
    <text x="1144" y="582" fill="#6E7268" font-size="13" font-family="Inter, Segoe UI, Arial, sans-serif">and providers cooperate.</text>

    <circle cx="1122" cy="656" r="9" fill="url(#accent)"/>
    <text x="1144" y="650" fill="#1F221D" font-size="17" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700">State persists locally</text>
    <text x="1144" y="671" fill="#6E7268" font-size="13" font-family="Inter, Segoe UI, Arial, sans-serif">Sessions and settings stay local.</text>
    <text x="1144" y="690" fill="#6E7268" font-size="13" font-family="Inter, Segoe UI, Arial, sans-serif">The UI remains responsive.</text>
  </g>

