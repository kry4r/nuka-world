  <text x="96" y="100" fill="#1F221D" font-size="38" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700">Nuka World Architecture</text>
  <text x="96" y="136" fill="#6E7268" font-size="18" font-family="Inter, Segoe UI, Arial, sans-serif">A light view of the desktop stack: UI, shell, Rust workspace, and local runtime foundations.</text>

